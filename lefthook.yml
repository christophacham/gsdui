pre-commit:
  parallel: true
  commands:
    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt -- --check
    cargo-clippy:
      glob: "*.rs"
      run: cargo clippy -- -D warnings
    no-ai-attribution:
      glob: "*.{rs,toml,json,md,css,html,sql}"
      run: |
        files=$(echo {staged_files} | tr ' ' '\n' | grep -v -E '^(\.claude/|\.planning/|static/)' | tr '\n' ' ')
        [ -z "$files" ] && exit 0
        if grep -rPi '(\bclaude\b.*\b(code|anthropic|opus)\b|\banthropic\b|co-authored-by.*claude)' $files; then
          echo "ERROR: AI attribution found in staged files"
          exit 1
        fi
    cargo-test:
      glob: "*.rs"
      run: cargo test --lib

pre-push:
  parallel: true
  commands:
    cargo-test-full:
      run: cargo test
    cargo-build:
      run: cargo build 2>&1 | (! grep -i 'warning')

commit-msg:
  commands:
    conventional-commit:
      run: 'head -1 {1} | grep -qE "^(feat|fix|refactor|chore|docs|test|perf|ci|build|style|revert)(\(.+\))?(!)?: .+"'
    no-ai-in-commit-msg:
      run: |
        if grep -rPi '(\bclaude\b.*\b(code|anthropic|opus)\b|\banthropic\b|co-authored-by.*claude)' {1}; then
          echo "ERROR: AI attribution found in commit message"
          exit 1
        fi
