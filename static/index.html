<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSD Pipeline UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #040814;
      color: #e0e6f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #7dd3fc;
    }
    p {
      font-size: 1.1rem;
      color: #94a3b8;
    }
    .status {
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background-color: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 0.5rem;
      display: inline-block;
    }
    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #22c55e;
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GSD Pipeline UI</h1>
    <p>Backend running. Frontend coming in Phase 2.</p>
    <div class="status">
      <span class="dot"></span>
      Daemon active
    </div>
  </div>
</body>
</html>
